<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FarmerChat Admin — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#0f2318 0%,#1a3a2a 50%,#1e4730 100%);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(46,204,113,0.06) 1px,transparent 1px);background-size:30px 30px;}
.login-wrap{width:100%;max-width:420px;position:relative;z-index:1;}
.login-card{background:#fff;border-radius:20px;padding:44px 40px;box-shadow:0 24px 60px rgba(0,0,0,0.25);}
.brand{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:8px;}
.brand-icon{width:44px;height:44px;background:linear-gradient(135deg,#1A3A2A,#2ECC71);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:white;}
.brand h2{font-size:22px;font-weight:800;color:#111C17;letter-spacing:-0.5px;}
.subtitle{text-align:center;color:#8A9E94;font-size:13px;margin-bottom:32px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:12px;font-weight:700;color:#3D4D45;margin-bottom:7px;}
.fg input{width:100%;padding:12px 16px;border:1.5px solid #E8EDEA;border-radius:10px;font-size:14px;font-family:inherit;color:#111C17;outline:none;transition:all 0.2s;}
.fg input:focus{border-color:#2ECC71;box-shadow:0 0 0 3px rgba(46,204,113,0.13);}
.btn-login{width:100%;padding:14px;background:#1A3A2A;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:all 0.2s;font-family:inherit;}
.btn-login:hover{background:#24503b;box-shadow:0 8px 20px rgba(26,58,42,0.28);}
.error-msg{background:#FEF2F2;color:#B91C1C;padding:10px 14px;border-radius:9px;font-size:13px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><i class="ph ph-plant"></i></div>
      <h2>FarmerChat</h2>
    </div>
    <p class="subtitle">Admin Portal — Sign in to manage the ecosystem</p>

    {% if messages %}
    {% for m in messages %}
    <div class="error-msg"><i class="ph ph-warning-circle"></i> {{ m }}</div>
    {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="fg">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required autofocus>
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login"><i class="ph ph-sign-in"></i> &nbsp;Access Dashboard</button>
    </form>
  </div>
</div>
</body>
</html>
